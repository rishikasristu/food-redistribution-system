<!DOCTYPE html>
<html>

<head>

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <a href="/dashboard"
       class="btn btn-primary mb-3">

        ← Back to Dashboard

    </a>

    <a href="/edit_profile"
        class="btn btn-warning mt-3">
   ✏️   Edit Profile
    </a>

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>👤 My Profile</h3>

        </div>

        <div class="card-body">

            <p>
                <strong>Name:</strong>
                {{ user.name }}
            </p>

            <p>
                <strong>Phone:</strong>
                {{ user.phone }}
            </p>

            <p>
                <strong>Email:</strong>
                {{ user.email }}
            </p>

            <p>
                <strong>Address:</strong>
                {{ user.address }}
            </p>

        </div>

    </div>

</div>

</body>

</html>
