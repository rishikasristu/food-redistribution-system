<!DOCTYPE html>
<html>

<head>

    <title>Donor Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto"
         style="max-width:500px;">

        <h2 class="text-center text-success mb-4">

            🔑 Donor Login

        </h2>

        <form action="/login"
              method="POST">

            <div class="mb-3">

                <label>User ID</label>

                <input type="text"
                       name="userid"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-success w-100">

                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
