<!DOCTYPE html>
<html>

<head>

    <title>Donor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-success">
            Welcome, {{ name }} 👋
        </h2>

        <p class="text-muted">
            Food Redistribution Donor Portal
        </p>

        <div class="row mt-4">

            <div class="col-md-3">

                <div class="card text-center shadow">

                    <div class="card-body">

                        <h5>Total Donations</h5>

                        <h2 class="text-primary">
                            {{ total }}
                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-center shadow">

                    <div class="card-body">

                        <h5>Pending</h5>

                        <h2 class="text-warning">
                            {{ pending }}
                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-center shadow">

                    <div class="card-body">

                        <h5>Accepted</h5>

                        <h2 class="text-success">
                            {{ accepted }}
                        </h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card text-center shadow">

                    <div class="card-body">

                        <h5>Expired</h5>

                        <h2 class="text-danger">
                            {{ expired }}
                        </h2>

                    </div>

                </div>

            </div>

        </div>

        <hr>

        <div class="d-grid gap-3 mt-3">

            <a href="/donate"
               class="btn btn-success">

                🍱 Donate Food

            </a>

            <a href="/history"
               class="btn btn-primary">

                📜 My Donations

            </a>

            <a href="/tracking"
               class="btn btn-info">

                📍 Donation Tracking

            </a>

            <a href="/profile"
               class="btn btn-warning">

                👤 My Profile

            </a>

            <a href="/logout"
               class="btn btn-danger">

                🚪 Logout

            </a>

        </div>

    </div>

</div>

</body>
</html>
