<!DOCTYPE html>
<html>

<head>

<title>Receiver Analytics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-success">

Receiver Analytics

</h2>

<hr>

<div class="row">

<div class="col">

<div class="alert alert-primary">

Total Donations:
{{ total }}

</div>

</div>

<div class="col">

<div class="alert alert-warning">

Pending:
{{ pending }}

</div>

</div>

<div class="col">

<div class="alert alert-success">

Accepted:
{{ accepted }}

</div>

</div>

<div class="col">

<div class="alert alert-danger">

Expired:
{{ expired }}

</div>

</div>

<div class="col">

<div class="alert alert-info">

Collected:
{{ collected }}

</div>

</div>

</div>

<a href="/receiver_dashboard"
   class="btn btn-primary">

Back

</a>

</div>

</div>

</body>

</html>
