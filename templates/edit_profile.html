<!DOCTYPE html>
<html>

<head>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-primary mb-4">
        ✏️ Edit Profile
    </h2>

    <form method="POST" action="/update_profile">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   value="{{ user.name }}">
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text"
                   name="phone"
                   class="form-control"
                   value="{{ user.phone }}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   value="{{ user.email }}">
        </div>

        <div class="mb-3">
            <label>Address</label>
            <textarea name="address"
                      class="form-control">{{ user.address }}</textarea>
        </div>

        <button class="btn btn-success">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
