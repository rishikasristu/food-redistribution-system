<!DOCTYPE html>
<html>

<head>

    <title>Donor Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto"
         style="max-width:600px;">

        <h2 class="text-center text-success mb-4">

            👤 Donor Registration

        </h2>

        <form action="/register"
              method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Phone Number
                </label>

                <input type="tel"
                       name="phone"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    User ID
                </label>

                <input type="text"
                       name="userid"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Confirm Password
                </label>

                <input type="password"
                       id="confirmPassword"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-success w-100">

                Register

            </button>

        </form>

        <hr>

        <p class="text-center">

            Already Registered?

            <a href="/login">
                Login Here
            </a>

        </p>

    </div>

</div>

</body>

</html>
