<!DOCTYPE html>
<html>

<head>

<title>Receiver Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-success">
Receiver Profile
</h2>

<hr>

<p>
<b>Organization:</b>
{{ receiver.organization_name }}
</p>

<p>
<b>Phone:</b>
{{ receiver.phone }}
</p>

<p>
<b>Email:</b>
{{ receiver.email }}
</p>

<p>
<b>Address:</b>
{{ receiver.address }}
</p>

<a href="/edit_receiver_profile"
   class="btn btn-warning">

Edit Profile

</a>

</div>

</div>

</body>

</html>
